name: Security Audit

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks Secret Scan
        run: |
          # Use the Gitleaks Docker image to avoid license requirements of the managed GitHub Action
          docker run -v ${{ github.workspace }}:/path zricethezav/gitleaks:latest detect --source=/path --verbose --redact
        continue-on-error: true

  sca-audit:
    name: Software Composition Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - name: Extract versions and Patch PyProject
        run: |
          export MANIFEST_VERSION=$(python -c "import re; m = re.search(r'coreason-manifest==([0-9]+\.[0-9]+\.[0-9]+)', open('pyproject.toml').read()); print('v' + m.group(1)) if m else exit(1)")
          export URN_AUTHORITY_VERSION=$(python -c "import re; m = re.search(r'coreason-urn-authority[>=~]+([0-9]+\.[0-9]+\.[0-9]+)', open('pyproject.toml').read()); print('v' + m.group(1)) if m else exit(1)")
          echo "MANIFEST_VERSION=$MANIFEST_VERSION" >> "$GITHUB_ENV"
          echo "URN_AUTHORITY_VERSION=$URN_AUTHORITY_VERSION" >> "$GITHUB_ENV"
          sed -i "s|coreason-manifest = { git = \"https://github.com/CoReason-AI/coreason-manifest.git\" }|coreason-manifest = { git = \"https://github.com/CoReason-AI/coreason-manifest.git\", tag = \"$MANIFEST_VERSION\" }|g" pyproject.toml || true
          sed -i "s|coreason-urn-authority = { git = \"https://github.com/CoReason-AI/coreason-urn-authority.git\" }|coreason-urn-authority = { git = \"https://github.com/CoReason-AI/coreason-urn-authority.git\", tag = \"$URN_AUTHORITY_VERSION\" }|g" pyproject.toml || true
          uv lock
        shell: bash
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.14'

      - name: Python SCA Audit (pip-audit)
        run: |
          if [ -f "pyproject.toml" ]; then
            uv export --format requirements-txt > requirements.txt
            uv tool run pip-audit -r requirements.txt -f sarif -o pip-audit.sarif || echo "Vulnerabilities found!"
            uv tool run pip-audit -r requirements.txt -f html -o pip-audit-report.html || true
          fi
        shell: bash

      - name: Node.js SCA Audit (npm audit)
        run: |
          if [ -f "package.json" ]; then
            npm install --package-lock-only
            npm audit --json > npm-audit.json || true
            npx @microsoft/npm-audit-sarif -i npm-audit.json -o npm-audit.sarif || true
          fi
        shell: bash

      - name: Black Duck Compliance Check
        run: |
          echo "INFO: Ready for Black Duck integration."
        shell: bash

      - name: Upload SARIF Reports to GitHub Advanced Security
        uses: github/codeql-action/upload-sarif@3f135f3a928cf93b5749d98d169a49e1d7cf7048 # v3.24.5
        with:
          sarif_file: .
        continue-on-error: true

      - name: Upload Compliance Reports as Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: security-audit-reports
          path: |
            pip-audit-report.html
            npm-audit.json
          retention-days: 14
