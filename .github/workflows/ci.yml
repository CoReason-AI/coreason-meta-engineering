name: CI

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validation:
    name: Meta-Engineering Matrix
    runs-on: [self-hosted, hetzner, x64]
    env:
      TEMPORAL_CI_NAMESPACE: ci-${{ github.repository_id }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}-${{ strategy.job-index }}
      CI_RUN_ID: ${{ github.run_id }}
      UV_CACHE_DIR: ${{ github.workspace }}/.uv_cache
    steps:
      - name: Pre-Flight Workspace Purity
        run: sudo chown -R $(whoami):$(whoami) ${{ github.workspace }} || true

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Substrate Purity Verification
        run: git clean -xfd -e .venv -e .uv_cache

      - name: Ecosystem Sync
        run: uv sync --all-extras

      - name: Check code
        run: uvx ruff check .

      - name: Format check
        run: uvx ruff format --check .

      - name: Typecheck
        run: uv run mypy src/ tests/

      - name: Audit dependencies
        run: uv run deptry src/

      - name: Provision Ephemeral Isolation
        run: temporal operator namespace create $TEMPORAL_CI_NAMESPACE --address 127.0.0.1:7233 || true

      - name: Meta-Engineering Test Suite
        run: uv run pytest --cov=src --cov-report=xml

      - name: Build docs
        run: uv run zensical build

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          verbose: true

      - name: Build wheel for Determinism Verification
        run: uv build

      - name: Verify SHA256 sum
        run: sha256sum dist/*.whl

      - name: Container & Network Teardown (Always Execute)
        if: always()
        run: |
          temporal operator namespace delete $TEMPORAL_CI_NAMESPACE --address 127.0.0.1:7233 --yes || true
          sudo chown -R $(whoami):$(whoami) ${{ github.workspace }}
