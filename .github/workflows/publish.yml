name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write # Required for PyPI OIDC Trusted Publishing and Sigstore
  pages: write    # Required for GitHub Pages deployment

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Harden Runner (Endpoint Network Security)
        uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e # v2.4.1
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.1.1
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Build Artifacts
        run: uv build

      - name: Generate SBOM
        uses: anchore/sbom-action@ab73386edf5a16606f3455b85a3c631e8c7c9451 # v0.14.3
        with:
          format: spdx-json
          output-file: sbom.spdx.json
          upload-release-assets: false

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@639206354f997637841549419b48c6600c0f4547 # v1.8.10
        with:
          attestations: false  # Requires Enterprise Cloud or public repo

      - name: Sign Wheel
        uses: sigstore/gh-action-sigstore-python@94a1d636ca2b6e15905d6255018610360a0f443b # v3.0.0
        with:
          inputs: >-
            dist/*.whl
            dist/*.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.sigstore.json
            sbom.spdx.json

      - name: Build Docs
        run: uv run zensical build --clean

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dee462962283 # v3.0.1
        with:
          path: site

  deploy-pages:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Harden Runner (Endpoint Network Security)
        uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e # v2.4.1
        with:
          egress-policy: audit

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
