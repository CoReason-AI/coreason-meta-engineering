name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - '*.*.*'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write # Required for PyPI OIDC Trusted Publishing and Sigstore
  pages: write    # Required for GitHub Pages deployment
  attestations: write # Required for SLSA build provenance

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Harden Runner (Endpoint Network Security)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Extract versions and Patch PyProject
        run: |
          export MANIFEST_VERSION=$(python -c "import re; m = re.search(r'coreason-manifest==([0-9]+\.[0-9]+\.[0-9]+)', open('pyproject.toml').read()); print('v' + m.group(1)) if m else exit(1)")
          export URN_AUTHORITY_VERSION=$(python -c "import re; m = re.search(r'coreason-urn-authority[>=~]+([0-9]+\.[0-9]+\.[0-9]+)', open('pyproject.toml').read()); print('v' + m.group(1)) if m else exit(1)")
          echo "MANIFEST_VERSION=$MANIFEST_VERSION" >> "$GITHUB_ENV"
          echo "URN_AUTHORITY_VERSION=$URN_AUTHORITY_VERSION" >> "$GITHUB_ENV"
          sed -i "s|coreason-manifest = { git = \"https://github.com/CoReason-AI/coreason-manifest.git\" }|coreason-manifest = { git = \"https://github.com/CoReason-AI/coreason-manifest.git\", tag = \"$MANIFEST_VERSION\" }|g" pyproject.toml || true
          sed -i "s|coreason-urn-authority = { git = \"https://github.com/CoReason-AI/coreason-urn-authority.git\" }|coreason-urn-authority = { git = \"https://github.com/CoReason-AI/coreason-urn-authority.git\", tag = \"$URN_AUTHORITY_VERSION\" }|g" pyproject.toml || true
          uv lock
        shell: bash

      - name: Install dependencies
        run: uv sync --all-extras --dev --frozen

      - name: Build Artifacts
        run: uv build

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.18.0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
          upload-release-assets: false

      - name: Generate SLSA Provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.2.3
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.12.4

      - name: Sign Wheel
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc # v3.3.0
        with:
          inputs: >-
            dist/*.whl
            dist/*.tar.gz

          source: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.1.0
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.sigstore.json
            sbom.spdx.json

      - name: Build Docs
        run: uv run zensical build --clean

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: site

  deploy-pages:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Harden Runner (Endpoint Network Security)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

  publish-container:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    env:
      REGISTRY_IMAGE: ghcr.io/coreason-ai/coreason-meta-engineering
    steps:
      - name: Harden Runner (Endpoint Network Security)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Extract versions and Patch PyProject
        run: |
          export MANIFEST_VERSION=$(python -c "import re; m = re.search(r'coreason-manifest==([0-9]+\.[0-9]+\.[0-9]+)', open('pyproject.toml').read()); print('v' + m.group(1)) if m else exit(1)")
          export URN_AUTHORITY_VERSION=$(python -c "import re; m = re.search(r'coreason-urn-authority[>=~]+([0-9]+\.[0-9]+\.[0-9]+)', open('pyproject.toml').read()); print('v' + m.group(1)) if m else exit(1)")
          echo "MANIFEST_VERSION=$MANIFEST_VERSION" >> "$GITHUB_ENV"
          echo "URN_AUTHORITY_VERSION=$URN_AUTHORITY_VERSION" >> "$GITHUB_ENV"
          sed -i "s|coreason-manifest = { git = \"https://github.com/CoReason-AI/coreason-manifest.git\" }|coreason-manifest = { git = \"https://github.com/CoReason-AI/coreason-manifest.git\", tag = \"$MANIFEST_VERSION\" }|g" pyproject.toml || true
          sed -i "s|coreason-urn-authority = { git = \"https://github.com/CoReason-AI/coreason-urn-authority.git\" }|coreason-urn-authority = { git = \"https://github.com/CoReason-AI/coreason-urn-authority.git\", tag = \"$URN_AUTHORITY_VERSION\" }|g" pyproject.toml || true
          uv lock
        shell: bash

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.3.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.10.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.7.0
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.12.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate SBOM for Container
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.18.0
        with:
          image: ${{ env.REGISTRY_IMAGE }}@${{ steps.build-and-push.outputs.digest }}
          format: spdx-json
          output-file: sbom-container.spdx.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 # v3.8.1

      - name: Sign the image with Cosign
        run: cosign sign --yes ${{ env.REGISTRY_IMAGE }}@${{ steps.build-and-push.outputs.digest }}

      - name: Generate SLSA Provenance for Container
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.2.3
        with:
          subject-name: ${{ env.REGISTRY_IMAGE }}
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
          push-to-registry: true

      - name: Publish to MCP Registry
        run: |
          if [ -f "server.json" ]; then
            npx @modelcontextprotocol/publisher publish --config server.json
          else
            echo "No server.json found, skipping MCP Registry publish."
          fi
