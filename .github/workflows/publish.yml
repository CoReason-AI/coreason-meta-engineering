name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - '*.*.*'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write # Required for PyPI OIDC Trusted Publishing and Sigstore
  pages: write    # Required for GitHub Pages deployment
  attestations: write # Required for SLSA build provenance

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Harden Runner (Endpoint Network Security)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --all-extras --dev --frozen

      - name: Build Artifacts
        run: uv build

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
          upload-release-assets: false

      - name: Generate SLSA Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Sign Wheel
        uses: sigstore/gh-action-sigstore-python@v3.3.0
        with:
          inputs: >-
            dist/*.whl
            dist/*.tar.gz

          source: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.sigstore.json
            sbom.spdx.json

      - name: Build Docs
        run: uv run zensical build --clean

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Harden Runner (Endpoint Network Security)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish-container:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate SBOM for Container
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}@${{ steps.build-and-push.outputs.digest }}
          format: spdx-json
          output-file: sbom-container.spdx.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Sign the image with Cosign
        run: cosign sign --yes ghcr.io/${{ github.repository }}@${{ steps.build-and-push.outputs.digest }}

      - name: Generate SLSA Provenance for Container
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
          push-to-registry: true

      - name: Publish to MCP Registry
        run: |
          if [ -f "server.json" ]; then
            npx @modelcontextprotocol/publisher publish --config server.json
          else
            echo "No server.json found, skipping MCP Registry publish."
          fi
