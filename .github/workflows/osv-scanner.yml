name: OSV-Scanner
on:
  pull_request:
    branches: [ coreason-develop, main ]
  schedule:
    - cron: '27 15 * * 4'
  push:
    branches: [ coreason-develop, main ]

permissions: read-all

jobs:
  scan:
    name: OSV-Scanner
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@c95a14d0e5bab51a9f56296a4eb0e416910cd350 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@764c91816374ff2d8fc2095dab36eecd42d61638 # v1.9.2

